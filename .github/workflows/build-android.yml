name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo & EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Install dependencies
        run: npm install

      - name: Setup EAS project (link)
        run: eas init --id 362ff944-d03d-4ade-882b-d38edec0ad44 --non-interactive
        continue-on-error: true
        env:
          EXPO_TOKEN: JiVqQEfdgigAdaWzqpaidhAl9bBiuXHLYtrdVgdD

      - name: Build APK via EAS
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: JiVqQEfdgigAdaWzqpaidhAl9bBiuXHLYtrdVgdD

      - name: Wait for build and download APK
        run: |
          echo "Build submitted to EAS. Check https://expo.dev for build status."
          echo "Once complete, download the .apk and sideload to your Samsung S23 Ultra."
